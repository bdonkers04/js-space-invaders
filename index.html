<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Space Invaders - Simple Clone</title>
  </head>
  <body>
    
    <div class="ui">Score: <span id="score">0</span></div>
    <div id="menu">
      <img src="sw_logo.png" alt="STAR WARS" style="width: 30%; height: 75%" />
      <h1 id="menu-title">SPACE INVADERS</h1>
      <p id="menu-subtitle">Press start to begin.</p>
      <button id="start-button" onclick="startGame()">Start Game</button>
      <p>Use <b>Arrow Keys</b> to Move | <b>Spacebar</b> to Shoot</p>
    </div>

    
    
    <canvas id="gameCanvas"></canvas>
  </body>
</html>
